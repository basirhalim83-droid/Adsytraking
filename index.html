<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — adsy-tracking</title>
<link rel="icon" type="image/png" href="img/logo-adsy.png">
<link rel="stylesheet" href="css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="img/logo-adsy.png" style="height:38px;width:38px;object-fit:contain">
      <div>
        <div style="font-size:.95rem;font-weight:800;line-height:1.1">adsy-tracking</div>
        <div style="font-size:.72rem;color:#8A94A6;font-weight:600">Tracking Resi Terpadu</div>
      </div>
    </div>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Masuk</button>
      <button class="login-tab" id="tab-register" onclick="switchTab('register')">Daftar</button>
    </div>

    <div class="login-error" id="loginError"></div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="email@adsy.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Masukkan password" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Masuk</button>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Nama</label>
        <input type="text" id="r-name" placeholder="Nama kamu">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="email@adsy.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Minimal 6 karakter" autocomplete="new-password">
      </div>
      <button class="btn-login" id="btnRegister" onclick="doRegister()">Daftar</button>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {
  await initSupabaseClient();
  const session = await sbGetSession();
  if (session) window.location.href = 'dashboard.html';
})();

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  hideErr();
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  const btn = document.getElementById('btnLogin');
  if (!email || !password) { showErr('Email dan password harus diisi.'); return; }

  btn.textContent = 'Masuk...'; btn.disabled = true;
  hideErr();
  try {
    await sbLogin(email, password);
    window.location.href = 'dashboard.html';
  } catch (e) {
    showErr(e.message === 'Invalid login credentials' ? 'Email atau password salah.' : e.message);
    btn.textContent = 'Masuk'; btn.disabled = false;
  }
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  const btn = document.getElementById('btnRegister');
  if (!name || !email || !password) { showErr('Semua field wajib diisi.'); return; }
  if (password.length < 6) { showErr('Password minimal 6 karakter.'); return; }

  btn.textContent = 'Mendaftar...'; btn.disabled = true;
  hideErr();
  try {
    await sbSignUp(email, password, name);
    window.location.href = 'dashboard.html';
  } catch (e) {
    showErr(e.message || 'Gagal mendaftar.');
    btn.textContent = 'Daftar'; btn.disabled = false;
  }
}

function showErr(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}
function hideErr() {
  document.getElementById('loginError').style.display = 'none';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
