<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — adsy-tracking</title>
<link rel="icon" type="image/png" href="img/logo-adsy.png">
<link rel="stylesheet" href="css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="sidebar-slot"></div>
<div id="header-slot"></div>
<div class="main-content">
  <div class="page" id="pageContent"></div>
</div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
(async () => {
  await initSupabaseClient();
  const user = await requireAuth();
  if (!user) return;
  renderLayout('dashboard', user);
  renderDashboard();
})();

function renderDashboard() {
  document.getElementById('pageContent').innerHTML = `
    <div class="empty">
      <div class="icon">📊</div>
      <div style="font-weight:700;color:var(--text-1);margin-bottom:6px">Dashboard ringkasan</div>
      <div style="font-size:.85rem">Belum ada data agregat -- dibangun terakhir setelah 3 tracking + upload jalan.</div>
      <div style="font-size:.85rem;margin-top:10px">
        Buka menu <b>Tracking Resi</b> di sidebar buat mulai upload &amp; pantau status pengiriman.
      </div>
    </div>
  `;
}
</script>
</body>
</html>
